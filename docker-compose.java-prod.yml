services:
  #===================== front-end =====================
  front-end-dev:
    build:
      context: ./front-end
      dockerfile: Dockerfile
      target: prod

    ports:
      - "3000:3000"
    volumes:
      - ./front-end:/app
      - /app/node_modules
 #===================== back-end =====================
  java-local:
    depends_on:
      - front-end-dev
    build:    
      context: ./back-end-java
      dockerfile: Dockerfile
      target: prod

    ports:
      - "8080:8080"

    env_file:
      - ${LOCAL_ENV_FILE:-.env.local}

    extra_hosts:
      - "host.docker.internal:host-gateway"

    restart: unless-stopped